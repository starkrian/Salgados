<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Salgados</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e67e22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #fff5e6; 
            color: #333;
            margin: 0;
            padding: 15px; 
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 500px; padding-bottom: 30px; }
        h2 { text-align: center; color: #d35400; margin-bottom: 20px; }
        
        .card { background: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card h3 { margin-top: 0; color: #444; font-size: 1.1rem; border-bottom: 2px solid #ffeed9; padding-bottom: 10px; }
        
        .card-total { background: linear-gradient(135deg, #e67e22, #d35400); color: white; text-align: center; }
        .card-total h3 { color: white; border-bottom: none; opacity: 0.9; margin-bottom: 5px; padding-bottom: 0; }
        .total-valor { font-size: 2.5rem; font-weight: 600; margin: 0; text-shadow: 1px 2px 4px rgba(0,0,0,0.2); }

        input, select, input[type="file"] { 
            font-family: 'Poppins', sans-serif; padding: 12px; margin: 8px 0; 
            width: 100%; box-sizing: border-box; border: 1px solid #ddd; 
            border-radius: 8px; background-color: #fafafa; 
        }
        input:focus, select:focus { border-color: #e67e22; outline: none; background-color: #fff; }
        
        button { font-family: 'Poppins', sans-serif; font-weight: 600; padding: 12px; width: 100%; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        
        .btn-add { background-color: #e67e22; color: white; font-size: 1rem; }
        .btn-add:hover { background-color: #d35400; }
        
        .btn-backup { background-color: #34495e; color: white; margin-bottom: 10px; }
        .btn-backup:hover { background-color: #2c3e50; }

        .cliente-item { background: #fff; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 5px solid #e67e22; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .cliente-info { display: flex; justify-content: space-between; align-items: center; }
        .cliente-nome { font-size: 1.1rem; color: #d35400; font-weight: 600;}
        .valor-total { color: #27ae60; font-size: 1.05rem; font-weight: 600;}
        
        .btn-pago { background-color: #2ecc71; color: white; padding: 8px 15px; margin-top: 0; width: auto; border-radius: 20px; font-size: 0.9rem; }
        
        .hist-item { border-left: 5px solid #2ecc71; opacity: 0.85; background-color: #fcfcfc; }
        .hist-nome { color: #27ae60; }
        .mensagem-vazia { text-align: center; color: #999; font-style: italic; padding: 10px 0; font-size: 0.9rem; }
        
        /* NOVO: Estilo para o botão de apagar do histórico */
        .btn-excluir { 
            background-color: transparent; 
            color: #e74c3c; 
            border: 1px solid #e74c3c; 
            padding: 6px 12px; 
            margin: 0; 
            width: auto; 
            border-radius: 8px; 
            font-size: 1rem; 
        }
        .btn-excluir:hover { background-color: #e74c3c; color: white; }

        .flex-row { display: flex; gap: 10px; }
        .cabecalho-historico { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffeed9; padding-bottom: 10px; margin-bottom: 15px; }
        .cabecalho-historico h3 { border: none; padding: 0; margin: 0; }
        .cabecalho-historico select { width: auto; padding: 5px 10px; margin: 0; font-size: 0.9rem; border-color: #e67e22; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🥟 Salgados da Chef</h2>

        <div class="card card-total">
            <h3>Total a Receber (Pendentes)</h3>
            <p class="total-valor" id="totalReceber">R$ 0,00</p>
        </div>

        <div class="card">
            <h3>Nova Venda</h3>
            <input type="text" id="nomeCliente" placeholder="Nome do Cliente (ex: João)" list="sugestoesClientes" autocomplete="off">
            <datalist id="sugestoesClientes"></datalist>

            <div class="flex-row">
                <input type="number" id="qtdSalgados" placeholder="Qtd (ex: 5)">
                <input type="number" id="valorUnidade" placeholder="Valor Un. (ex: 5.50)" step="0.01">
            </div>
            <button class="btn-add" onclick="adicionarVenda()">Adicionar Venda</button>
        </div>

        <div class="card">
            <h3>Valores a Receber</h3>
            <div id="listaClientes"></div>
        </div>

        <div class="card">
            <div class="cabecalho-historico">
                <h3>Histórico</h3>
                <select id="filtroMes" onchange="atualizarTela()"></select>
            </div>
            
            <p style="text-align: center; margin: 0; color: #27ae60; font-weight: bold; font-size: 1.2rem;" id="totalRecebidoMes">Faturado: R$ 0,00</p>
            <div id="listaHistorico"></div>
        </div>

        <div class="card">
            <h3>Segurança dos Dados</h3>
            <p style="font-size: 0.85rem; color: #666; margin-top:0;">Faça um backup semanal para não perder as contas caso o celular seja formatado ou o cache limpo.</p>
            <button class="btn-backup" onclick="fazerBackup()">💾 Baixar Arquivo de Backup</button>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 5px;">Restaurar backup antigo:</p>
            <input type="file" id="arquivoBackup" accept=".json" onchange="restaurarBackup(event)">
        </div>
    </div>

    <script>
        let vendas = JSON.parse(localStorage.getItem('vendasSalgados')) || {};
        let historico = JSON.parse(localStorage.getItem('historicoSalgados')) || [];

        function padronizarNome(texto) {
            return texto.trim().replace(/\s+/g, ' ').toLowerCase()
                .replace(/(?:^|\s)\S/g, function(a) { return a.toUpperCase(); });
        }

        function adicionarVenda() {
            let nomeBruto = document.getElementById('nomeCliente').value;
            let qtd = parseInt(document.getElementById('qtdSalgados').value);
            let valorInput = document.getElementById('valorUnidade').value.replace(',', '.');
            let valor = parseFloat(valorInput);

            if (!nomeBruto || isNaN(qtd) || isNaN(valor)) {
                alert("Por favor, preencha todos os campos corretamente.");
                return;
            }

            let nome = padronizarNome(nomeBruto);

            if (vendas[nome]) {
                vendas[nome].quantidade += qtd;
                vendas[nome].valorTotal += (qtd * valor);
            } else {
                vendas[nome] = { quantidade: qtd, valorTotal: (qtd * valor) };
            }

            salvarDados();
            
            document.getElementById('nomeCliente').value = '';
            document.getElementById('qtdSalgados').value = '';
        }

        function quitarDivida(nomeDoCliente) {
            if (confirm(`Confirmar o recebimento de ${nomeDoCliente}?`)) {
                let dataAtual = new Date().toLocaleDateString('pt-BR');
                historico.push({
                    nome: nomeDoCliente,
                    quantidade: vendas[nomeDoCliente].quantidade,
                    valorTotal: vendas[nomeDoCliente].valorTotal,
                    data: dataAtual
                });

                delete vendas[nomeDoCliente];
                salvarDados();
            }
        }

        // NOVO: Função para excluir item do histórico
        function excluirHistorico(indexOriginal) {
            if (confirm("Tem certeza que deseja apagar este registro do histórico? Esse valor sairá do cálculo do seu faturamento.")) {
                // Remove 1 item a partir da posição exata dele no histórico
                historico.splice(indexOriginal, 1);
                salvarDados();
            }
        }

        function salvarDados() {
            localStorage.setItem('vendasSalgados', JSON.stringify(vendas));
            localStorage.setItem('historicoSalgados', JSON.stringify(historico));
            atualizarTela();
        }

        function atualizarTela() {
            let lista = document.getElementById('listaClientes');
            let listaHist = document.getElementById('listaHistorico');
            let totalReceberElem = document.getElementById('totalReceber');
            let totalRecebidoElem = document.getElementById('totalRecebidoMes');
            let datalistSugestoes = document.getElementById('sugestoesClientes');
            let selectMes = document.getElementById('filtroMes');

            let mesSelecionadoAnterior = selectMes.value;
            selectMes.innerHTML = ''; 
            lista.innerHTML = ''; 
            listaHist.innerHTML = '';
            datalistSugestoes.innerHTML = '';

            let somaReceber = 0;
            let nomesSugeridos = new Set();
            let mesesDisponiveis = new Set();

            // --- 1. PROCESSA PENDENTES ---
            if (Object.keys(vendas).length === 0) {
                lista.innerHTML = '<p class="mensagem-vazia">Nenhuma dívida pendente. Que venham mais vendas! 🚀</p>';
            } else {
                for (let cliente in vendas) {
                    let dados = vendas[cliente];
                    somaReceber += dados.valorTotal;
                    nomesSugeridos.add(cliente);
                    
                    lista.innerHTML += `
                        <div class="cliente-item">
                            <div class="cliente-info">
                                <div>
                                    <span class="cliente-nome">${cliente}</span> <br>
                                    <small>Salgados: ${dados.quantidade} un.</small> <br>
                                    <span class="valor-total">R$ ${dados.valorTotal.toFixed(2).replace('.', ',')}</span>
                                </div>
                                <button class="btn-pago" onclick="quitarDivida('${cliente}')">✅ Receber</button>
                            </div>
                        </div>
                    `;
                }
            }
            totalReceberElem.innerText = `R$ ${somaReceber.toFixed(2).replace('.', ',')}`;

            // --- 2. PREPARA DADOS DO HISTÓRICO ---
            historico.forEach((item) => {
                nomesSugeridos.add(item.nome); 
                let partes = item.data.split('/');
                if(partes.length === 3) {
                    mesesDisponiveis.add(partes[1] + '/' + partes[2]); 
                }
            });

            const nomesDosMeses = {'01':'Jan', '02':'Fev', '03':'Mar', '04':'Abr', '05':'Mai', '06':'Jun', '07':'Jul', '08':'Ago', '09':'Set', '10':'Out', '11':'Nov', '12':'Dez'};
            
            let mesesArray = Array.from(mesesDisponiveis).sort((a, b) => {
                let [mA, aA] = a.split('/');
                let [mB, aB] = b.split('/');
                return new Date(aB, mB - 1) - new Date(aA, mA - 1);
            });

            let mesSelecionado = "";

            if (mesesArray.length === 0) {
                let option = document.createElement('option');
                option.value = "";
                option.text = "Sem vendas";
                selectMes.appendChild(option);
                selectMes.disabled = true;
            } else {
                selectMes.disabled = false;
                mesesArray.forEach(mesAno => {
                    let [m, a] = mesAno.split('/');
                    let option = document.createElement('option');
                    option.value = mesAno;
                    option.text = `${nomesDosMeses[m]}/${a}`;
                    selectMes.appendChild(option);
                });

                if (mesesDisponiveis.has(mesSelecionadoAnterior)) {
                    selectMes.value = mesSelecionadoAnterior;
                    mesSelecionado = mesSelecionadoAnterior;
                } else {
                    selectMes.value = mesesArray[0];
                    mesSelecionado = mesesArray[0];
                }
            }

            // --- 3. EXIBE HISTÓRICO FILTRADO ---
            // NOVO: Adiciona o index original para a função de apagar não se perder com os filtros
            let historicoComIndex = historico.map((item, index) => {
                return { ...item, indexOriginal: index };
            });

            let historicoFiltrado = [];
            if (mesSelecionado !== "") {
                historicoFiltrado = historicoComIndex.filter(item => {
                    let partes = item.data.split('/');
                    return (partes[1] + '/' + partes[2]) === mesSelecionado;
                });
            }

            let somaRecebido = 0;
            if (historicoFiltrado.length === 0) {
                listaHist.innerHTML = '<p class="mensagem-vazia">Nenhum recebimento registrado neste período.</p>';
            } else {
                let histInvertido = [...historicoFiltrado].reverse();
                for (let item of histInvertido) {
                    somaRecebido += item.valorTotal;
                    
                    listaHist.innerHTML += `
                        <div class="cliente-item hist-item">
                            <div class="cliente-info">
                                <div>
                                    <span class="cliente-nome hist-nome">${item.nome}</span> <br>
                                    <small>${item.data} - ${item.quantidade} un.</small> <br>
                                    <span class="valor-total" style="color:#666;">R$ ${item.valorTotal.toFixed(2).replace('.', ',')}</span>
                                </div>
                                <button class="btn-excluir" onclick="excluirHistorico(${item.indexOriginal})" title="Apagar Registro">🗑️</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            let textoFaturamento = mesSelecionado !== "" ? selectMes.options[selectMes.selectedIndex].text : '-';
            totalRecebidoElem.innerText = `Faturado (${textoFaturamento}): R$ ${somaRecebido.toFixed(2).replace('.', ',')}`;

            // --- 4. ALIMENTA O AUTOCOMPLETAR ---
            nomesSugeridos.forEach(nome => {
                let option = document.createElement('option');
                option.value = nome;
                datalistSugestoes.appendChild(option);
            });
        }

        // --- FUNÇÕES DE BACKUP ---
        function fazerBackup() {
            let dadosCompletos = { pendentes: vendas, pagos: historico };
            let dataStr = JSON.stringify(dadosCompletos);
            let blob = new Blob([dataStr], { type: "application/json" });
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.href = url;
            a.download = "backup-salgados-" + new Date().toISOString().slice(0,10) + ".json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function restaurarBackup(event) {
            let arquivo = event.target.files[0];
            if (!arquivo) return;
            let leitor = new FileReader();
            leitor.onload = function(e) {
                try {
                    let dadosRestaurados = JSON.parse(e.target.result);
                    if (dadosRestaurados.pendentes) {
                        vendas = dadosRestaurados.pendentes;
                        historico = dadosRestaurados.pagos || [];
                        salvarDados();
                        alert("Backup restaurado com sucesso! Seus dados voltaram.");
                        document.getElementById('arquivoBackup').value = '';
                    } else {
                        alert("Arquivo de backup inválido.");
                    }
                } catch (erro) {
                    alert("Erro ao ler o arquivo. Certifique-se de que escolheu o arquivo correto.");
                }
            };
            leitor.readAsText(arquivo);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('Erro no sw', err));
        }

        atualizarTela();
    </script>

</body>
</html>
